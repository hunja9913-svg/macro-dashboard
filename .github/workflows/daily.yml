name: daily-macro

on:
  schedule:
    # UTC 기준. 22:30 UTC ≈ 한국 07:30 (미국 증시 마감 후). 평일만.
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write # 생성 결과를 저장소에 커밋하기 위해 필요

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 한글 폰트 설치 (이미지 렌더용)
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum

      - run: npm install

      - name: 데이터 수집 + 글 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: npm run daily

      - name: 결과 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data posts
          git diff --staged --quiet || git commit -m "chore: 매크로 자동 갱신 $(date -u +%Y-%m-%d)"
          git push
